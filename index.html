<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papillon</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  background: #0f0f13;
  color: white;
  text-align: center;
  padding: 40px;
}
input, button {
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}
button {
  background: #6c63ff;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🦋 Papillon</h1>
<p>Connexion Pronote</p>

<input id="url" placeholder="URL Pronote"><br>
<input id="username" placeholder="Identifiant"><br>
<input id="password" type="password" placeholder="Mot de passe"><br>

<button onclick="login()">Se connecter</button>

<script>
async function login() {
  const url = document.getElementById("url").value;
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url, username, password })
  });

  const data = await res.json();

  if (data.success) {
    alert("Bienvenue " + data.name);
  } else {
    alert("Erreur : " + data.error);
  }
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
